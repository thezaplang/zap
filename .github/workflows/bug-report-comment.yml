name: "Bug report comment"

on:
  issues:
    types: [opened]

jobs:
  comment-on-title:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check issue title and comment
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();

            if (title == "bug report") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: "👋 Thanks for reporting a bug! Please edit the issue title with a short description of the bug so it is easier to identify."
              });
            }
